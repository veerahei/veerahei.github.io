<!DOCTYPE html>
<html lang="en">

<head>
    <title>Projects</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!--Bootstrap-linkitys-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!--Tyylitiedoston linkitys-->
    <link href="style.css" rel="stylesheet">

    <!--Google fontti "Ultra" banneriotsikkoon-->
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Ultra&display=swap"
        rel="stylesheet">
    <!--Google fontti "Open sans" sivustolle-->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans">

    <!--Script Github-repositorioiden hakemiseen sivulle-->
    <script>
        //Hae Github repositoriot. API-dokumentaatio: https://docs.github.com/en/rest/repos/repos?apiVersion=2022-11-28#list-repositories-for-a-user 
        fetch("https://api.github.com/users/veerahei/repos")
            .then(response => response.json())
            .then(data => showProjects(data))
            .catch(error => document.getElementById("projects").innerHTML = "Projektitietoja ei voida hakea")

        //Käsittele haettu json-data
        function showProjects(projectsData) {
            //Luo muuttujat haettaville tiedoille ja html:ään sijoitettavalle tiedolle
            let projectName;
            let projectLink;
            let language;
            let information = "";

            //Haetussa datassa on useita projekteja. Jokaisesta projektista halutaan samat tiedot, projektin nimi ja linkki projektin github-repositorioon
            //Käy kaikki projektit läpi for-loopilla
            for (let i = 0; i < projectsData.length; i++) {
                if (projectsData[i].fork == false && projectsData[i].private == false) {
                    //Tallenna projektin nimi ja linkki muuttujiin
                    projectName = projectsData[i].name;
                    projectLink = projectsData[i].html_url;
                    language = projectsData[i].language;

                    //Aseta nimi ja linkki html:ään sijoitettavaan information-muuttujaan
                    //jokainen projektikokonaisuus (nimi + linkki) asetetaan div-tagin sisälle, jonka class on "yksittainen projekti". Luokan perusteella voidaan tehdä muotoiluja jokaiselle projektikokonaisuudelle
                    information += "<div class='container m-2 projektiContainer'><h2>" + projectName + "</h2> <p>Programming language: " + language + "</p>";
                    information += "<a class='btn custom-button' href=" + projectLink + ">Check project in Github</a> </div>";
                }
            }

            //Aseta tiedot html:ään
            document.getElementById("projects").innerHTML = information;
        }
    </script>
</head>

<body>

    <!--Banneri-->
    <div class="p-5 text-center custom-banner">
        <a href="index.html">Veera Heikkinen</a>
    </div>


    <!--Navigaatio-->
    <nav class="navbar navbar-expand-sm custom-navbar">
        <div class="container-fluid">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Profile</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="projects.html">Projects</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact</a>
                </li>
            </ul>
        </div>
    </nav>

    <!--Sivun sisältö-->
    <main>
        <!--Github projektit-->
        <div class="container mt-5">
            <div>
                <h1>Projects</h1>
                <p>Click the link to find my project in Github.</p>
                <div id="projects"></div>
            </div>
        </div>
    </main>


    <!--Footer-->
    <div class="mt-5 p-4  custom-footer">
        <p>&copy; Veera Heikkinen 2026</p>
    </div>


</body>

</html>
