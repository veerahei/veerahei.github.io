<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap 5 Website Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        fetch("https://api.github.com/users/veerahei/repos")
            .then(response => response.json())
            .then(data => showProjects(data))
            .catch(error => document.getElementById("projects").innerHTML = "Projektitietoja ei voida hakea")


        function showProjects(projectsData) {
            //Luo muuttujat haettaville tiedoille ja html:ään sijoitettavalle tiedolle
            let projectName;
            let projectLink;
            let information;
            let language;

            //Haetussa datassa on useita projekteja. Jokaisesta projektista halutaan samat tiedot, projektin nimi ja linkki projektin github-repositorioon
            //Käy kaikki projektit läpi for-loopilla
            for (let i = 0; i < projectsData.length; i++) {
                if (projectsData[i].fork == false && projectsData[i].private == false) {
                    //Tallenna projektin nimi ja linkki muuttujiin
                    projectName = projectsData[i].name;
                    projectLink = projectsData[i].html_url;
                    language = projectsData[i].language;

                    //Aseta nimi ja linkki html:ään sijoitettavaan information-muuttujaan
                    //jokainen projektikokonaisuus (nimi + linkki) asetetaan div-tagin sisälle, jonka class on "yksittainen projekti". Luokan perusteella voidaan tehdä muotoiluja jokaiselle projektikokonaisuudelle
                    information += "<div class='container bg-success m-2 yksittainenProjekti'><h2>" + projectName + "</h2> <p>Programming language: " + language + "</p>";
                    information += "<a class=linkButton href=" + projectLink + ">Check project in Github</a> </div>";
                }
            }


            //Aseta tiedot html:ään
            document.getElementById("projects").innerHTML = information;
        }
    </script>
</head>

<body>

    <!--Banneri-->
    <div class="p-5 bg-primary text-white text-center">
        <h1>Veera Heikkinen</h1>
    </div>

    <!--Navigaatio-->
    <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
        <div class="container-fluid">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="index.html">Profile</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="projects.html">Projects</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="conatct.html">Contact</a>
                </li>
            </ul>
        </div>
    </nav>

    <!--Sivun sisältö-->
    <main>
        <!--Github projektit-->
        <div class="container mt-5">
            <div>
                <h2>Projects</h2>
                <p>Click the link to find my project in Github.</p>
                <div id="projects"></div>
            </div>
        </div>
    </main>


    <!--Footer-->
    <div class="mt-5 p-4 bg-dark text-white text-center">
        <p>Footer</p>
    </div>

</body>

</html>
