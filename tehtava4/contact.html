<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap 5 Website Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!--Tyylitiedoston linkitys-->
    <link href="style.css" rel="stylesheet">

    <!--Google fontti "Ultra" banneriotsikkoon-->
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Ultra&display=swap"
        rel="stylesheet">

    <!--Google fontti "Open sans" sivustolle-->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans">

    <!--Ikonikirjaston linkitys -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

</head>

<!--Aseta footer sivun alareunaan flex:in avulla. Lähde: https://stackoverflow.com/questions/75360163/vertical-align-a-footer-to-the-bottom-of-the-page-bootstrap-5-->

<body class="d-flex flex-column vh-100">

    <!--Banneri-->
    <div class="p-5 text-center custom-banner">
        <a href="index.html">Veera Heikkinen</a>
    </div>


    <!--Navigaatio-->
    <nav class="navbar navbar-expand-sm custom-navbar">
        <div class="container-fluid">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Profile</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="projects.html">Projects</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact</a>
                </li>
            </ul>
        </div>
    </nav>

    <!--Grid-osiot-->
    <div class="container pb-5">
        <!--Yhteystiedot-->
        <div class="row">
            <div class="col-md-4 pt-5">
                <h1>Contact</h1>
                <p>name.lastname@email.com</p>
                <p>040 123 45 67</p>
                <!-- Sosiaalisen median ikonit -->
                <a href="https://www.facebook.com/" class="fa fa-facebook"></a>
                <a href="https://www.instagram.com/" class="fa fa-instagram"></a>
                <a href="https://fi.linkedin.com/" class="fa fa-linkedin"></a>
            </div>

            <!--Yhteydenottolomake, toteutettu Formspree-lomakkeella: https://formspree.io/s-->
            <div class="col-md-8 pt-5">
                <h2>Send me a message</h2>
                <form action="https://formspree.io/f/xqeyawgl" method="POST">
                    <div class="mb-3 mt-3">
                        <label for="name" class="form-label">Name:</label>
                        <input type="text" class="form-control" id="name" placeholder="Enter name" name="name">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email:</label>
                        <input type="email" class="form-control" id="email" placeholder="Enter email" name="email">
                    </div>
                    <div class="mb-3">
                        <label for="comment">Message:</label>
                        <textarea class="form-control" rows="5" id="comment" name="text"></textarea>
                    </div>
                    <button type="submit" class="btn custom-button">Submit</button>
                </form>
            </div>
        </div>
    </div>

    <!--Footer-->
    <!--Aseta footer sivun alareunaan  mt-auto:n avulla. Lähde: https://stackoverflow.com/questions/75360163/vertical-align-a-footer-to-the-bottom-of-the-page-bootstrap-5-->
    <div class="p-4 mt-auto custom-footer">
        <p>&copy; Veera Heikkinen 2026</p>
    </div>

</body>

</html>
